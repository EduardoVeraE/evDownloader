name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync (con dev extras; uv instala Python 3.14 si falta)
        run: uv sync --extra dev

      - name: Ruff
        run: uv run ruff check src/ tests/

      - name: Mypy
        run: uv run mypy src/evdownloader

      - name: Pytest
        run: uv run python -m pytest -q
