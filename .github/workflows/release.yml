name: Release

# Publica en PyPI al empujar un tag vX.Y.Z. Usa "trusted publishing" (OIDC):
# no requiere tokens ni secretos, pero el publisher debe registrarse una vez en
# https://pypi.org/manage/project/evdownloader/settings/publishing/
# (owner: EduardoVeraE, repo: evDownloader, workflow: release.yml, environment: pypi).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # necesario para el trusted publishing (OIDC)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build sdist + wheel
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
